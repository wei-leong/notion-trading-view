<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Base reset */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #191919;
            height: 100%;
            overflow: hidden;
        }
        /* Aggressively pin the container to the 4 corners of the Notion block */
        .tradingview-widget-container {
            position: absolute !important;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100% !important;
            width: 100% !important;
        }
        /* Force the inner widget to stretch, leaving room for the copyright */
        .tradingview-widget-container__widget {
            height: calc(100% - 32px) !important; 
            width: 100% !important;
        }
    </style>
</head>
<body>
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/heatmap/stock/" rel="noopener nofollow" target="_blank"><span class="blue-text">Stock Heatmap</span></a><span class="trademark"> by TradingView</span></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
      {
      "dataSource": "SPX500",
      "blockSize": "market_cap_basic",
      "blockColor": "change",
      "grouping": "sector",
      "locale": "en",
      "symbolUrl": "",
      "colorTheme": "dark",
      "exchanges": [],
      "hasTopBar": false,
      "isDataSetEnabled": false,
      "isZoomEnabled": true,
      "hasSymbolTooltip": true,
      "isMonoSize": false,
      "width": "100%",
      "height": "100%"
    }
      </script>
    </div>
    </body>
</html>
